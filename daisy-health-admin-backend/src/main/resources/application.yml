server:
  port: 8080

spring:
  application:
    name: daisy-health-admin-backend
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 21MB
  profiles:
    active: mysql
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

daisy:
  upload-dir: uploads
  security:
    jwt-secret: ${DAISY_JWT_SECRET:daisy-health-local-dev-secret-please-change-32}
    jwt-expiration-ms: ${DAISY_JWT_EXPIRATION_MS:28800000}

---
spring:
  config:
    activate:
      on-profile: mock
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.mybatis.spring.boot.autoconfigure.MybatisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://localhost:3306/daisy_health?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  redis:
    host: localhost
    port: 6379

mybatis:
  configuration:
    map-underscore-to-camel-case: true

knife4j:
  enable: true
